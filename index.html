<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Worker Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma,Arial;
}

.box{
    max-width:950px;
    margin:30px auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
}

input,button{

    width:100%;
    padding:12px;
    margin-top:10px;
    border:0;
    border-radius:8px;

}

button{

    background:#8b5cf6;
    color:white;
    cursor:pointer;

}

button:hover{
    opacity:.85;
}


#panel{
    display:none;
}


#editor{

    height:550px;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;

}


#msg{
    color:#ff7777;
}


#status{
    color:#7cff7c;
}

</style>

</head>


<body>



<div class="box" id="loginBox">

<h2>
🔐 Private Login
</h2>


<input id="username"
placeholder="Username">


<input id="password"
type="password"
placeholder="Password">


<button onclick="login()">
ورود
</button>


<p id="msg"></p>


</div>






<div class="box" id="panel">


<h2>
🚀 Worker Private IDE
</h2>


<p id="status">
آماده
</p>


<div id="editor"></div>



<button onclick="saveCode()">
💾 Save
</button>


<button onclick="deployWorker()">
🚀 Deploy
</button>


<button onclick="saveDeploy()">
💾🚀 Save & Deploy
</button>


<button onclick="logout()">
خروج
</button>


</div>







<script>


const AUTH =
"https://private-panel-auth.alipviv8698.workers.dev";



let editor;





// LOGIN

async function login(){


let username =
document.getElementById("username").value;


let password =
document.getElementById("password").value;



let res =
await fetch(
AUTH+"/login",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

});



let data =
await res.json();



if(data.ok){

localStorage.session =
data.session;


showPanel();


}else{

document.getElementById("msg").innerHTML =
"اطلاعات اشتباه است ❌";

}


}







// CHECK SESSION

async function checkSession(){


let session =
localStorage.session;


if(!session)
return;



let res =
await fetch(
AUTH+"/check",
{
headers:{
Authorization:session
}
}
);



let data =
await res.json();



if(data.ok){

showPanel();

}else{

logout();

}


}







function showPanel(){


document.getElementById("loginBox").style.display="none";

document.getElementById("panel").style.display="block";


initEditor();


}







// MONACO EDITOR

function initEditor(){


if(editor)
return;



require.config({

paths:{

vs:
"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs"

}

});



require(
["vs/editor/editor.main"],

function(){


editor =
monaco.editor.create(

document.getElementById("editor"),

{

value:
`export default {

async fetch(request, env){

return new Response("Hello Worker");

}

}`,

language:"javascript",

theme:"vs-dark",

automaticLayout:true

}

);



loadCode();


});



}







// LOAD

async function loadCode(){


let res =
await fetch(
AUTH+"/load",
{
headers:{
Authorization:localStorage.session
}
}
);



let data =
await res.json();



if(data.code){

editor.setValue(data.code);

}


}








// SAVE

async function saveCode(){


setStatus("در حال ذخیره...");



let res =
await fetch(
AUTH+"/save",
{

method:"POST",

headers:{

"Content-Type":"application/json",

Authorization:localStorage.session

},

body:JSON.stringify({

code:editor.getValue()

})

}

);



let data =
await res.json();



if(data.ok){

setStatus("ذخیره شد ✅");

}else{

setStatus("خطا در ذخیره ❌");

}


}







// DEPLOY

async function deployWorker(){


setStatus("در حال Deploy...");



let res =
await fetch(
AUTH+"/deploy",
{

method:"POST",

headers:{

Authorization:localStorage.session

}

}

);



let data =
await res.json();



if(data.success){

setStatus("Deploy موفق شد ✅");

}else{

setStatus("خطا در Deploy ❌");

console.log(data);

}


}







// SAVE + DEPLOY

async function saveDeploy(){


await saveCode();


await deployWorker();


}







function setStatus(text){

document.getElementById("status").innerHTML=text;

}







function logout(){

localStorage.removeItem("session");

location.reload();

}




checkSession();



</script>


</body>

</html>
