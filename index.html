<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Worker Panel</title>

<!-- CodeMirror 6: much lighter and far more reliable on mobile for
     select-all / cut / large paste operations than Monaco -->
<script type="importmap">
{
  "imports": {
    "codemirror": "https://esm.sh/codemirror@6.0.1",
    "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.2",
    "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
    "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1",
    "@codemirror/view": "https://esm.sh/@codemirror/view@6.28.0",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.6.0",
    "prettier/standalone": "https://esm.sh/prettier@3.3.3/standalone",
    "prettier/plugins/babel": "https://esm.sh/prettier@3.3.3/plugins/babel",
    "prettier/plugins/estree": "https://esm.sh/prettier@3.3.3/plugins/estree"
  }
}
</script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma,Arial;
}

.box{
    max-width:1000px;
    margin:30px auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
}

.box.fullscreen{
    max-width:none;
    margin:0;
    border-radius:0;
    min-height:100vh;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:0;
    border-radius:8px;
}

button{
    background:#8b5cf6;
    color:white;
    cursor:pointer;
    font-family:tahoma,Arial;
}

button:hover{
    opacity:.85;
}

button:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.btn-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.btn-row button{
    width:auto;
    flex:1 1 auto;
    min-width:110px;
}

.toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-top:15px;
    background:#151515;
    padding:8px;
    border-radius:8px;
}

.toolbar button{
    width:auto;
    margin-top:0;
    padding:8px 12px;
    font-size:13px;
    background:#2a2a2a;
    flex:none;
}

.toolbar button:hover{
    background:#3a3a3a;
    opacity:1;
}

.toolbar .grow{
    flex:1 1 auto;
}

#panel{
    display:none;
}

#editor{
    height:65vh;
    min-height:400px;
    margin-top:10px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #333;
}

#editor .cm-editor{
    height:100%;
}

#editor .cm-scroller{
    overflow:auto;
    font-family:"Fira Code","Consolas",monospace;
}

#panel.fullscreen #editor{
    height:calc(100vh - 220px);
}

#msg{
    color:#ff7777;
}

#statusbar{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#999;
    padding:6px 4px;
    direction:ltr;
    text-align:left;
}

#status{
    color:#7cff7c;
    font-size:13px;
}

.dirty-dot{
    display:none;
    color:#ffcc55;
    margin-right:6px;
}

</style>

</head>


<body>

<div class="box" id="loginBox">

<h2>🔐 Private Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">ورود</button>

<p id="msg"></p>

</div>


<div class="box" id="panel">

<h2>🚀 Worker Private IDE</h2>

<p id="status"><span class="dirty-dot" id="dirtyDot">●</span>آماده</p>

<div class="toolbar">
  <button onclick="formatCode()" title="فرمت خودکار کد">🧹 Format</button>
  <button onclick="toggleWordWrap()" id="wrapBtn">↩ Wrap: Off</button>
  <button onclick="changeFontSize(1)">A+</button>
  <button onclick="changeFontSize(-1)">A-</button>
  <button onclick="toggleFullscreen()" id="fsBtn">⛶ تمام‌صفحه</button>
  <span class="grow"></span>
  <button onclick="toggleTheme()" id="themeBtn">☀️ روشن</button>
</div>

<div id="editor"></div>

<div id="statusbar">
  <span id="cursorPos">Ln 1, Col 1</span>
  <span id="charCount">0 chars</span>
</div>

<div class="btn-row" style="margin-top:15px;">
<button onclick="saveCode()">💾 Save (Ctrl+S)</button>
<button onclick="deployWorker()">🚀 Deploy</button>
<button onclick="saveDeploy()">💾🚀 Save & Deploy (Ctrl+Enter)</button>
<button onclick="logout()" style="background:#553333;">خروج</button>
</div>

</div>


<script type="module">

import { EditorView, basicSetup } from "codemirror";
import { javascript } from "@codemirror/lang-javascript";
import { oneDark } from "@codemirror/theme-one-dark";
import { Compartment, EditorState } from "@codemirror/state";
import { keymap } from "@codemirror/view";
import { indentWithTab } from "@codemirror/commands";
import * as prettier from "prettier/standalone";
import prettierBabel from "prettier/plugins/babel";
import prettierEstree from "prettier/plugins/estree";

const AUTH = "https://private-panel-auth.alipviv8698.workers.dev";

let view;
let isDirty = false;
let wordWrap = false;
let isFullscreen = false;
let isDarkTheme = true;
let fontSize = 14;

const wrapCompartment = new Compartment();
const themeCompartment = new Compartment();
const fontCompartment = new Compartment();

function fontTheme(size){
  return EditorView.theme({ "&": { fontSize: size + "px" } });
}

function getValue(){
  return view.state.doc.toString();
}

function setValue(text){
  view.dispatch({
    changes: { from: 0, to: view.state.doc.length, insert: text }
  });
}

function saveShortcut(){
  saveCode();
  return true;
}

function saveDeployShortcut(){
  saveDeploy();
  return true;
}

function buildEditor(initialValue){
  view = new EditorView({
    state: EditorState.create({
      doc: initialValue,
      extensions: [
        basicSetup,
        javascript(),
        keymap.of([
          indentWithTab,
          { key: "Mod-s", run: saveShortcut, preventDefault: true },
          { key: "Mod-Enter", run: saveDeployShortcut, preventDefault: true }
        ]),
        wrapCompartment.of([]),
        themeCompartment.of(oneDark),
        fontCompartment.of(fontTheme(fontSize)),
        EditorView.updateListener.of((update)=>{
          if(update.docChanged){
            setDirty(true);
            updateCharCount();
          }
          if(update.selectionSet || update.docChanged){
            const pos = update.state.selection.main.head;
            const line = update.state.doc.lineAt(pos);
            document.getElementById("cursorPos").innerText =
              `Ln ${line.number}, Col ${pos - line.from + 1}`;
          }
        })
      ]
    }),
    parent: document.getElementById("editor")
  });

  updateCharCount();
}

// LOGIN
async function login(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  try{
    let res = await fetch(AUTH+"/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ username, password })
    });

    let data = await res.json();

    if(data.ok){
      localStorage.session = data.session;
      showPanel();
    }else{
      document.getElementById("msg").innerHTML = "اطلاعات اشتباه است ❌";
    }
  }catch(e){
    document.getElementById("msg").innerHTML = "خطا در اتصال ❌";
  }
}

// CHECK SESSION
async function checkSession(){
  let session = localStorage.session;
  if(!session) return;

  try{
    let res = await fetch(AUTH+"/check", { headers:{ Authorization:session } });
    let data = await res.json();
    if(data.ok){
      showPanel();
    }else{
      logout();
    }
  }catch(e){
    // network issue - don't force logout, let user retry
  }
}

function showPanel(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("panel").style.display="block";
  initEditor();
}

// CODEMIRROR EDITOR
function initEditor(){
  if(view) return;

  buildEditor(`export default {

  async fetch(request, env, ctx) {

    return new Response("Hello Worker");

  }

}`);

  window.addEventListener("keydown", (e)=>{
    if(e.key === "F11"){
      e.preventDefault();
      toggleFullscreen();
    }
  });

  window.addEventListener("beforeunload", (e)=>{
    if(isDirty){
      e.preventDefault();
      e.returnValue = "";
    }
  });

  loadCode();
}

function setDirty(val){
  isDirty = val;
  document.getElementById("dirtyDot").style.display = val ? "inline" : "none";
}

function updateCharCount(){
  if(!view) return;
  document.getElementById("charCount").innerText = getValue().length + " chars";
}

async function formatCode(){
  if(!view) return;
  try{
    setStatus("در حال فرمت...");
    const formatted = await prettier.format(getValue(), {
      parser: "babel",
      plugins: [prettierBabel, prettierEstree],
      semi: true,
      singleQuote: false
    });
    setValue(formatted);
    setStatus("فرمت شد ✅");
  }catch(e){
    setStatus("خطا در فرمت (احتمالاً سینتکس ناقصه) ❌");
  }
}

function toggleWordWrap(){
  wordWrap = !wordWrap;
  view.dispatch({
    effects: wrapCompartment.reconfigure(wordWrap ? EditorView.lineWrapping : [])
  });
  document.getElementById("wrapBtn").innerText = "↩ Wrap: " + (wordWrap ? "On" : "Off");
}

function changeFontSize(delta){
  if(!view) return;
  fontSize = Math.min(28, Math.max(10, fontSize + delta));
  view.dispatch({
    effects: fontCompartment.reconfigure(fontTheme(fontSize))
  });
}

function toggleFullscreen(){
  isFullscreen = !isFullscreen;
  document.getElementById("panel").classList.toggle("fullscreen", isFullscreen);
  document.getElementById("fsBtn").innerText = isFullscreen ? "⤢ خروج از تمام‌صفحه" : "⛶ تمام‌صفحه";
  setTimeout(()=>{ if(view) view.requestMeasure(); }, 50);
}

function toggleTheme(){
  isDarkTheme = !isDarkTheme;
  view.dispatch({
    effects: themeCompartment.reconfigure(isDarkTheme ? oneDark : [])
  });
  document.getElementById("themeBtn").innerText = isDarkTheme ? "☀️ روشن" : "🌙 تیره";
}

// LOAD
async function loadCode(){
  try{
    let res = await fetch(AUTH+"/load", { headers:{ Authorization:localStorage.session } });
    let data = await res.json();
    if(data.code){
      setValue(data.code);
      setDirty(false);
      updateCharCount();
    }
  }catch(e){
    setStatus("خطا در بارگذاری کد ❌");
  }
}

// SAVE
async function saveCode(){
  setStatus("در حال ذخیره...");

  try{
    let res = await fetch(AUTH+"/save", {
      method:"POST",
      headers:{ "Content-Type":"application/json", Authorization:localStorage.session },
      body:JSON.stringify({ code: getValue() })
    });

    let data = await res.json();

    if(data.ok){
      setStatus("ذخیره شد ✅");
      setDirty(false);
    }else{
      setStatus("خطا در ذخیره ❌");
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// DEPLOY
async function deployWorker(){
  setStatus("در حال Deploy...");

  try{
    let res = await fetch(AUTH+"/deploy", {
      method:"POST",
      headers:{ Authorization:localStorage.session }
    });

    let data = await res.json();

    if(data.success){
      setStatus("Deploy موفق شد ✅");
    }else{
      setStatus("خطا در Deploy ❌");
      console.log(data);
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// SAVE + DEPLOY
async function saveDeploy(){
  await saveCode();
  await deployWorker();
}

function setStatus(text){
  document.getElementById("status").innerHTML =
    '<span class="dirty-dot" id="dirtyDot">●</span>' + text;
  document.getElementById("dirtyDot").style.display = isDirty ? "inline" : "none";
}

function logout(){
  localStorage.removeItem("session");
  location.reload();
}

// expose functions used by inline onclick= handlers, since this is a module
window.login = login;
window.saveCode = saveCode;
window.deployWorker = deployWorker;
window.saveDeploy = saveDeploy;
window.logout = logout;
window.formatCode = formatCode;
window.toggleWordWrap = toggleWordWrap;
window.changeFontSize = changeFontSize;
window.toggleFullscreen = toggleFullscreen;
window.toggleTheme = toggleTheme;

checkSession();

</script>

</body>

</html>
