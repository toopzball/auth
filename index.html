<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Worker Panel</title>

<!-- CodeMirror 5 from cdnjs: plain <script> tags (no ES modules / import maps),
     same CDN domain that already works for you. Much more reliable on mobile
     for select-all / cut / large paste than Monaco, and doesn't depend on
     esm.sh which can be unreachable on some networks. -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/theme/dracula.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.11/mode/htmlmixed/htmlmixed.min.js"></script>

<!-- Prettier 2.0.3 from cdnjs: classic global scripts (window.prettier / window.prettierPlugins) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prettier/2.0.3/standalone.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prettier/2.0.3/parser-babel.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma,Arial;
}

.box{
    max-width:1000px;
    margin:30px auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
}

.box.fullscreen{
    max-width:none;
    margin:0;
    border-radius:0;
    min-height:100vh;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:0;
    border-radius:8px;
}

button{
    background:#8b5cf6;
    color:white;
    cursor:pointer;
    font-family:tahoma,Arial;
}

button:hover{
    opacity:.85;
}

button:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.btn-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.btn-row button{
    width:auto;
    flex:1 1 auto;
    min-width:110px;
}

.toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-top:15px;
    background:#151515;
    padding:8px;
    border-radius:8px;
}

.toolbar button{
    width:auto;
    margin-top:0;
    padding:8px 12px;
    font-size:13px;
    background:#2a2a2a;
    flex:none;
}

.toolbar button:hover{
    background:#3a3a3a;
    opacity:1;
}

.toolbar .grow{
    flex:1 1 auto;
}

.tabs{
    display:flex;
    gap:8px;
    margin-top:15px;
}

.tab-btn{
    width:auto;
    margin-top:0;
    padding:10px 16px;
    background:#2a2a2a;
    border-radius:8px 8px 0 0;
    opacity:.6;
}

.tab-btn.active{
    background:#8b5cf6;
    opacity:1;
}

#panel{
    display:none;
}

#editor-wrap{
    height:65vh;
    min-height:400px;
    margin-top:10px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #333;
}

#panel.fullscreen #editor-wrap{
    height:calc(100vh - 220px);
}

.CodeMirror{
    height:100% !important;
    direction:ltr;
    text-align:left;
}

#msg{
    color:#ff7777;
}

#statusbar{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#999;
    padding:6px 4px;
    direction:ltr;
    text-align:left;
}

#status{
    color:#7cff7c;
    font-size:13px;
}

.dirty-dot{
    display:none;
    color:#ffcc55;
    margin-right:6px;
}

</style>

</head>


<body>

<div class="box" id="loginBox">

<h2>🔐 Private Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">ورود</button>

<p id="msg"></p>

</div>


<div class="box" id="panel">

<h2>🚀 Worker Private IDE</h2>

<div class="tabs">
  <button class="tab-btn active" id="tabWorker" onclick="switchTarget('worker')">⚙️ Worker</button>
  <button class="tab-btn" id="tabGithub" onclick="switchTarget('github')">🌐 index.html (GitHub)</button>
</div>

<p id="status"><span class="dirty-dot" id="dirtyDot">●</span>آماده</p>

<div class="toolbar">
  <button onclick="formatCode()" title="فرمت خودکار کد">🧹 Format</button>
  <button onclick="toggleWordWrap()" id="wrapBtn">↩ Wrap: Off</button>
  <button onclick="changeFontSize(1)">A+</button>
  <button onclick="changeFontSize(-1)">A-</button>
  <button onclick="toggleFullscreen()" id="fsBtn">⛶ تمام‌صفحه</button>
  <button onclick="pullCurrent()" title="دریافت کد واقعی" id="pullBtn" style="background:#2d5a3d;">🔄 دریافت از Cloudflare</button>
  <button onclick="clearEditor()" title="پاک کردن همه‌ی کد" style="background:#5a2d2d;">🗑 پاک کردن همه</button>
     <button onclick="copyEditor()">📋 کپی همه</button>
     <button onclick="downloadJS()">⬇️ دانلود JS</button>
  <span class="grow"></span>
  <button onclick="toggleTheme()" id="themeBtn">☀️ روشن</button>
</div>

<div id="editor-wrap"><textarea id="editor"></textarea></div>

<div id="statusbar">
  <span id="cursorPos">Ln 1, Col 1</span>
  <span id="charCount">0 chars</span>
</div>

<div class="btn-row" id="workerButtons" style="margin-top:15px;">
<button onclick="saveCode()">💾 Save (Ctrl+S)</button>
<button onclick="deployWorker()">🚀 Deploy</button>
<button onclick="saveDeploy()">💾🚀 Save & Deploy (Ctrl+Enter)</button>
</div>

<div class="btn-row" id="githubButtons" style="display:none; margin-top:15px;">
<button onclick="commitToGithub()">💾 Commit به GitHub (Ctrl+S)</button>
</div>

<div class="btn-row" style="margin-top:15px;">
<button onclick="logout()" style="background:#553333;">خروج</button>
</div>

</div>


<script>

const AUTH = "https://private-panel-auth.alipviv8698.workers.dev";

let cm;
let isDirty = false;
let wordWrap = false;
let isFullscreen = false;
let isDarkTheme = true;
let fontSize = 14;
let currentTarget = "worker";
let githubSha = null;

// LOGIN
async function login(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  try{
    let res = await fetch(AUTH+"/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ username, password })
    });

    let data = await res.json();

    if(data.ok){
      localStorage.session = data.session;
      showPanel();
    }else{
      document.getElementById("msg").innerHTML = "اطلاعات اشتباه است ❌";
    }
  }catch(e){
    document.getElementById("msg").innerHTML = "خطا در اتصال ❌";
  }
}

// CHECK SESSION
async function checkSession(){
  let session = localStorage.session;
  if(!session) return;

  try{
    let res = await fetch(AUTH+"/check", { headers:{ Authorization:session } });
    let data = await res.json();
    if(data.ok){
      showPanel();
    }else{
      logout();
    }
  }catch(e){
    // network issue - don't force logout, let user retry
  }
}

function showPanel(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("panel").style.display="block";
  // wait a tick so the panel has real layout/size before CodeMirror measures it
  setTimeout(initEditor, 0);
}

// CODEMIRROR EDITOR
function initEditor(){
  if(cm) return;

  if(typeof CodeMirror === "undefined"){
    setStatus("خطا: کتابخانه ادیتور لود نشد ❌ (اتصال اینترنت را چک کن)");
    return;
  }

  cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode:"javascript",
    theme:"dracula",
    lineNumbers:true,
    matchBrackets:true,
    autoCloseBrackets:true,
    styleActiveLine:true,
    tabSize:2,
    indentUnit:2,
    indentWithTabs:false,
    lineWrapping:false,
    extraKeys:{
      "Ctrl-S": function(){ saveCurrent(); return false; },
      "Cmd-S": function(){ saveCurrent(); return false; },
      "Ctrl-Enter": function(){ if(currentTarget === "worker") saveDeploy(); else commitToGithub(); return false; },
      "Cmd-Enter": function(){ if(currentTarget === "worker") saveDeploy(); else commitToGithub(); return false; }
    }
  });

  cm.setValue(`export default {

  async fetch(request, env, ctx) {

    return new Response("Hello Worker");

  }

}`);

  cm.getWrapperElement().style.fontSize = fontSize + "px";

  cm.on("change", ()=>{
    setDirty(true);
    updateCharCount();
  });

  cm.on("cursorActivity", ()=>{
    let pos = cm.getCursor();
    document.getElementById("cursorPos").innerText =
      `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
  });

  window.addEventListener("keydown", (e)=>{
    if(e.key === "F11"){
      e.preventDefault();
      toggleFullscreen();
    }
  });

  window.addEventListener("beforeunload", (e)=>{
    if(isDirty){
      e.preventDefault();
      e.returnValue = "";
    }
  });

  updateCharCount();
  loadCode();
}

function setDirty(val){
  isDirty = val;
  document.getElementById("dirtyDot").style.display = val ? "inline" : "none";
}

function updateCharCount(){
  if(!cm) return;
  document.getElementById("charCount").innerText = cm.getValue().length + " chars";
}

function formatCode(){
  if(!cm) return;
  if(currentTarget !== "worker"){
    setStatus("Format فعلاً فقط برای کد Worker (JS) در دسترسه");
    return;
  }
  if(typeof prettier === "undefined" || !window.prettierPlugins || !window.prettierPlugins.babel){
    setStatus("خطا: کتابخانه Format لود نشد ❌");
    return;
  }
  try{
    setStatus("در حال فرمت...");
    const formatted = prettier.format(cm.getValue(), {
      parser:"babel",
      plugins:[window.prettierPlugins.babel],
      semi:true,
      singleQuote:false
    });
    cm.setValue(formatted);
    setStatus("فرمت شد ✅");
  }catch(e){
    setStatus("خطا در فرمت (احتمالاً سینتکس ناقصه) ❌");
  }
}

function toggleWordWrap(){
  wordWrap = !wordWrap;
  cm.setOption("lineWrapping", wordWrap);
  document.getElementById("wrapBtn").innerText = "↩ Wrap: " + (wordWrap ? "On" : "Off");
}

function changeFontSize(delta){
  if(!cm) return;
  fontSize = Math.min(28, Math.max(10, fontSize + delta));
  cm.getWrapperElement().style.fontSize = fontSize + "px";
  cm.refresh();
}

function toggleFullscreen(){
  isFullscreen = !isFullscreen;
  document.getElementById("panel").classList.toggle("fullscreen", isFullscreen);
  document.getElementById("fsBtn").innerText = isFullscreen ? "⤢ خروج از تمام‌صفحه" : "⛶ تمام‌صفحه";
  setTimeout(()=>{ if(cm) cm.refresh(); }, 50);
}

function toggleTheme(){
  isDarkTheme = !isDarkTheme;
  cm.setOption("theme", isDarkTheme ? "dracula" : "default");
  document.getElementById("themeBtn").innerText = isDarkTheme ? "☀️ روشن" : "🌙 تیره";
}

function clearEditor(){
  if(!cm) return;
  if(!confirm("مطمئنی می‌خوای همه‌ی کد داخل ادیتور پاک بشه؟ (تا وقتی Save نکنی، روی Cloudflare چیزی تغییر نمی‌کنه)")){
    return;
  }
  cm.setValue("");
  cm.focus();
  setDirty(true);
  updateCharCount();
  setStatus("ادیتور پاک شد — فراموش نکن اگه لازم داری Save/Deploy کنی");
}
async function copyEditor() {
  if (!cm) return;

  try {
    await navigator.clipboard.writeText(cm.getValue());
    setStatus("📋 تمام کد کپی شد ✅");
  } catch (e) {
    // حالت قدیمی مرورگرها
    cm.execCommand("selectAll");
    document.execCommand("copy");
    cm.setCursor(cm.firstLine(), 0);
    setStatus("📋 تمام کد کپی شد ✅");
  }
       }
     function downloadJS() {
  if (!cm) return;

  const code = cm.getValue();
  const isGithub = currentTarget === "github";
  const filename = isGithub ? "index.html" : "worker.js";
  const mime = isGithub ? "text/html" : "application/javascript";

  const blob = new Blob([code], { type: mime });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(a.href);

  setStatus("⬇️ فایل " + filename + " دانلود شد ✅");
     }
function saveCurrent(){
  if(currentTarget === "worker"){
    saveCode();
  }else{
    commitToGithub();
  }
}

function switchTarget(target){
  if(target === currentTarget) return;

  if(isDirty){
    if(!confirm("تغییرات ذخیره‌نشده داری — با عوض‌کردن تب از بین می‌رن. ادامه بدم؟")){
      return;
    }
  }

  currentTarget = target;

  document.getElementById("tabWorker").classList.toggle("active", target === "worker");
  document.getElementById("tabGithub").classList.toggle("active", target === "github");
  document.getElementById("workerButtons").style.display = target === "worker" ? "flex" : "none";
  document.getElementById("githubButtons").style.display = target === "github" ? "flex" : "none";
  document.getElementById("pullBtn").innerText = target === "worker" ? "🔄 دریافت از Cloudflare" : "🔄 دریافت از GitHub";

  cm.setOption("mode", target === "worker" ? "javascript" : "htmlmixed");

  if(target === "worker"){
    loadCode();
  }else{
    loadFromGithub();
  }
}

function pullCurrent(){
  if(currentTarget === "worker"){
    pullFromCloudflare();
  }else{
    loadFromGithub();
  }
}

// GITHUB LOAD
async function loadFromGithub(){
  setStatus("در حال دریافت از GitHub...");

  try{
    let res = await fetch(AUTH+"/github/load", { headers:{ Authorization:localStorage.session } });
    let data = await res.json();

    if(data.ok){
      cm.setValue(data.code);
      githubSha = data.sha;
      setDirty(false);
      updateCharCount();
      setStatus("index.html از GitHub دریافت شد ✅");
    }else{
      let extra = data.status ? (" [HTTP " + data.status + "]") : "";
      setStatus("خطا در دریافت از GitHub ❌" + extra + (data.error ? " (" + data.error + ")" : ""));
      console.log("GitHub load error:", data);
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// GITHUB COMMIT
async function commitToGithub(){
  setStatus("در حال Commit به GitHub...");

  try{
    let res = await fetch(AUTH+"/github/save", {
      method:"POST",
      headers:{ "Content-Type":"application/json", Authorization:localStorage.session },
      body:JSON.stringify({ code: cm.getValue(), message: "Update index.html via Private Panel" })
    });

    let data = await res.json();

    if(data.ok){
      setStatus("با موفقیت روی GitHub Commit شد ✅");
      setDirty(false);
      githubSha = data.sha || githubSha;
    }else{
      let extra = data.status ? (" [HTTP " + data.status + "]") : "";
      setStatus("خطا در Commit ❌" + extra + (data.error ? " (" + data.error + ")" : ""));
      console.log("GitHub commit error:", data);
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// PULL FROM CLOUDFLARE (the actual currently-deployed script, not the local KV cache)
async function pullFromCloudflare(){
  if(isDirty){
    if(!confirm("تغییرات ذخیره‌نشده داری — با دریافت از Cloudflare، این تغییرات از بین می‌رن. ادامه بدم؟")){
      return;
    }
  }

  setStatus("در حال دریافت از Cloudflare...");

  try{
    let res = await fetch(AUTH+"/pull", { headers:{ Authorization:localStorage.session } });
    let data = await res.json();

    if(data.ok){
      cm.setValue(data.code);
      setDirty(false);
      updateCharCount();
      setStatus("کد واقعی از Cloudflare دریافت شد ✅");
    }else{
      let extra = data.status ? (" [HTTP " + data.status + "]") : "";
      let detailText = data.detail ? (" " + JSON.stringify(data.detail)) : "";
      setStatus("خطا در دریافت از Cloudflare ❌" + extra + (data.error ? " (" + data.error + ")" : "") + detailText);
      console.log("Pull error detail:", data);
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// LOAD
async function loadCode(){
  try{
    let res = await fetch(AUTH+"/load", { headers:{ Authorization:localStorage.session } });
    let data = await res.json();
    if(data.code){
      cm.setValue(data.code);
      setDirty(false);
      updateCharCount();
    }
  }catch(e){
    setStatus("خطا در بارگذاری کد ❌");
  }
}

// SAVE
async function saveCode(){
  setStatus("در حال ذخیره...");

  try{
    let res = await fetch(AUTH+"/save", {
      method:"POST",
      headers:{ "Content-Type":"application/json", Authorization:localStorage.session },
      body:JSON.stringify({ code: cm.getValue() })
    });

    let data = await res.json();

    if(data.ok){
      setStatus("ذخیره شد ✅");
      setDirty(false);
    }else{
      setStatus("خطا در ذخیره ❌");
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// DEPLOY
async function deployWorker(){
  setStatus("در حال Deploy...");

  try{
    let res = await fetch(AUTH+"/deploy", {
      method:"POST",
      headers:{ Authorization:localStorage.session }
    });

    let data = await res.json();

    if(data.success){
      setStatus("Deploy موفق شد ✅");
    }else{
      let errText = (data.errors && data.errors.length) ? JSON.stringify(data.errors) : "";
      setStatus("خطا در Deploy ❌ " + errText);
      console.log(data);
    }
  }catch(e){
    setStatus("خطا در اتصال ❌");
  }
}

// SAVE + DEPLOY
async function saveDeploy(){
  await saveCode();
  await deployWorker();
}

function setStatus(text){
  document.getElementById("status").innerHTML =
    '<span class="dirty-dot" id="dirtyDot">●</span>' + text;
  document.getElementById("dirtyDot").style.display = isDirty ? "inline" : "none";
}

function logout(){
  localStorage.removeItem("session");
  location.reload();
}

checkSession();

</script>

</body>

</html>
